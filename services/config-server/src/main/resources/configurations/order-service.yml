spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/order?options=-c%20timezone=Asia/Ho_Chi_Minh
    username: alibou
    password: alibou
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: orderConfirmation:com.example.ecommerce.kafka.OrderConfirmation
application: 
  config:
    customer-url: http://localhost:8222/api/v1/customers
    payment-url: http://localhost:8222/api/v1/payment
    product-url: http://localhost:8222/api/v1/products
server:
  port: 8070
