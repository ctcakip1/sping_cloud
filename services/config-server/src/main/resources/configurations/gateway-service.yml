server:
  port: 8222

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: customer-service
          uri: lb:http://CUSTOMER_SERVICE
          predicates:
            - Path=/api/v1/customers/**
        - id: product-service
          uri: lb:http://PRODUCT_SERVICE
          predicates:
            - Path=/api/v1/products/**
        - id: order-service
          uri: lb:http://ORDER_SERVICE
          predicates:
            - Path=/api/v1/orders/**
        - id: orderline-service
          uri: lb:http://ORDER_SERVICE
          predicates:
            - Path=/api/v1/orderlines/**
        - id: payment-service
          uri: lb:http://PAYMENT_SERVICE
          predicates:
            - Path=/api/v1/payments/**
